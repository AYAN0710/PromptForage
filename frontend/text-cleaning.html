<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Cleaning - PromptForge AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="prompt.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="laser-bg"></canvas>

    <!-- Top Navbar -->
    <nav class="top-nav">
        <div class="logo">Prompt<span>Forge</span></div>
        <ul class="nav-links">
            <li><a href="index.html#hero">Home</a></li>
            <li><a href="index.html#modules">Modules</a></li>
        </ul>
    </nav>

    <main class="scroll-container">
        <!-- Section: Text Cleaning Workspace -->
        <section class="snap-section prompt-module-section">
            <div class="prompt-container glass-container flex-col">
                <div class="mini-hero glass-panel">
                    <h2>TEXT <span class="highlight" style="background: linear-gradient(to right, #ffb347 0%, #ffcc33 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">CLEANING</span></h2>
                    <p>Clean, format, and organize your text in seconds.Keywords and Entity recognition added.</p>
                </div>
                
                <div class="prompt-workspace glass-panel">
                    <label class="prompt-label"><strong>Enter your raw text:</strong></label>
                    <div class="input-group">
                        <textarea id="raw-text" placeholder="E.g., Please clean this messy text... (PII, typos, etc.)" class="prompt-input" style="min-height: 100px; resize: vertical; padding-top: 1rem;"></textarea>
                        <div class="button-group" style="display: flex; flex-direction: column; gap: 0.5rem; justify-content: center;">
                            <button id="clean-btn" class="cta-button" style="background: linear-gradient(135deg, #b35900 0%, #ff8c00 100%);">Clean Text</button>
                            <button id="keywords-btn" class="cta-button" style="background: linear-gradient(135deg, #b35900 0%, #ff8c00 100%);">Keywords</button>
                            <button id="entities-btn" class="cta-button" style="background: linear-gradient(135deg, #b35900 0%, #ff8c00 100%);">Entities</button>
                        </div>
                    </div>
                    
                    <div class="response-grid" id="response-container" style="display: none; max-height: unset;">
                        <div class="response-row">
                            <div class="response-col">
                                <h3 id="response-title" style="color: #ffb347;">Response</h3>
                                <div id="unified-response" class="output-box" style="min-height: 150px; font-size: 1.15rem; padding: 1.5rem; line-height: 1.6; margin-top: 0.5rem;"></div>
                            </div>
                        </div>
                        <div class="response-row" style="justify-content: center; margin-top: 1.5rem;">
                            <button id="clear-btn" class="cta-button" style="background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); border-radius: 8px;">Clear</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-section">
                <nav class="small-navbar glass-panel">
                    <div class="footer-logo">PromptForge &copy; 2026</div>
                    <ul class="footer-links">
                        <li><a href="#">Privacy</a></li>
                        <li><a href="#">Terms</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </section>
    </main>

    <script src="text-cleaning.js"></script>
</body>
</html>
