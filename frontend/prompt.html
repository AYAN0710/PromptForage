<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Module - PromptForge AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="prompt.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="laser-bg"></canvas>

    <!-- Top Navbar -->
    <nav class="top-nav">
        <div class="logo">Prompt<span>Forge</span></div>
        <ul class="nav-links">
            <li><a href="index.html#hero">Home</a></li>
            <li><a href="index.html#modules">Modules</a></li>
        </ul>
    </nav>

    <main class="scroll-container">
        <!-- Section: Prompt Module Workspace -->
        <section class="snap-section prompt-module-section">
            <div class="prompt-container glass-container flex-col">
                <div class="mini-hero glass-panel">
                    <h2>PROMPT <span class="highlight" style="background: linear-gradient(to right, #2ecc71 0%, #a8e6cf 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">MODULE</span></h2>
                    <p>Generate prompts for optimized zero-shot, few-shot, and chain-of-thought results.</p>
                </div>
                
                <div class="prompt-workspace glass-panel">
                    <label class="prompt-label"><strong>Enter your base prompt:</strong></label>
                    <div class="input-group">
                        <input type="text" id="base-prompt" placeholder="E.g., Explain quantum computing..." class="prompt-input">
                        <button id="generate-btn" class="cta-button" style="background: linear-gradient(135deg, #1e8449 0%, #2ecc71 100%);">Generate</button>
                    </div>
                    
                    <div class="response-grid" id="response-container" style="display: none;">
                        <div class="response-row">
                            <div class="response-col">
                                <h3>Zero-Shot Request</h3>
                                <div id="zero-request" class="output-box"></div>
                            </div>
                            <div class="response-col">
                                <h3>Zero-Shot Response</h3>
                                <div id="zero-response" class="output-box"></div>
                            </div>
                        </div>
                        <div class="response-row">
                            <div class="response-col">
                                <h3>Few-Shot Request</h3>
                                <div id="few-request" class="output-box"></div>
                            </div>
                            <div class="response-col">
                                <h3>Few-Shot Response</h3>
                                <div id="few-response" class="output-box"></div>
                            </div>
                        </div>
                        <div class="response-row">
                            <div class="response-col">
                                <h3>CoT Request</h3>
                                <div id="cot-request" class="output-box"></div>
                            </div>
                            <div class="response-col">
                                <h3>CoT Response</h3>
                                <div id="cot-response" class="output-box"></div>
                            </div>
                        </div>
                        <div class="response-row" style="justify-content: center; margin-top: 1.5rem;">
                            <button id="clear-btn" class="cta-button" style="background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); border-radius: 8px;">Clear</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-section">
                <nav class="small-navbar glass-panel">
                    <div class="footer-logo">PromptForge &copy; 2026</div>
                    <ul class="footer-links">
                        <li><a href="#">Privacy</a></li>
                        <li><a href="#">Terms</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </section>
    </main>

    <script src="prompt.js"></script>
</body>
</html>
